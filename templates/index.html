<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 자동 포스팅 봇</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-circles">
        <div></div><div></div><div></div>
    </div>

    <div class="container">
        <header>
            <h1>Coupang Auto Poster</h1>
            <p class="subtitle">쿠팡 상품 스크래핑부터 네이버 카페 자동 포스팅까지</p>
        </header>

        <form id="workflowForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="coupang_urls">쿠팡 상품 URL (여러 개일 경우 줄바꿈으로 구분)</label>
                    <textarea id="coupang_urls" rows="5" placeholder="https://www.coupang.com/vp/products/1...&#10;https://www.coupang.com/vp/products/2..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="interval_minutes">포스팅 간격 (분)</label>
                    <input type="number" id="interval_minutes" value="5" min="1" required>
                </div>

                <div class="form-group">
                    <label for="partners_id">쿠팡 파트너스 ID</label>
                    <input type="text" id="partners_id" placeholder="AF1234567" required>
                </div>

                <div class="form-group">
                    <label for="gemini_key">Gemini API Key</label>
                    <input type="password" id="gemini_key" placeholder="AI-..." required>
                </div>


                
                <div class="form-group">
                    <label for="naver_id">네이버 ID</label>
                    <input type="text" id="naver_id" placeholder="naver_id" required>
                </div>

                <div class="form-group">
                    <label for="naver_pw">네이버 비밀번호</label>
                    <input type="password" id="naver_pw" placeholder="password" required>
                </div>

                <div class="form-group">
                    <label for="cafe_id">네이버 카페 ID</label>
                    <input type="text" id="cafe_id" placeholder="joonggonara" required>
                </div>

                <div class="form-group">
                    <label for="menu_id">카페 메뉴(게시판) ID</label>
                    <input type="text" id="menu_id" placeholder="123" required>
                </div>

                <div class="form-group full-width" style="margin-top: -0.5rem; margin-bottom: 1rem;">
                    <label style="font-size: 0.8rem; opacity: 0.8;">카페/메뉴 프리셋 (자주 쓰는 카페 저장)</label>
                    <div style="display: flex; gap: 8px;">
                        <select id="cafe_preset_select" style="flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; padding: 5px;">
                            <option value="">저장된 프리셋 선택...</option>
                        </select>
                        <button type="button" id="save_cafe_preset" style="background: var(--secondary-color); border: none; border-radius: 8px; color: #fff; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">저장</button>
                        <button type="button" id="delete_cafe_preset" style="background: #ff4d4d; border: none; border-radius: 8px; color: #fff; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;">삭제</button>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; grid-column: span 2; margin-top: 1rem;">
                    <button type="submit" class="btn-submit" id="submitBtn" style="flex: 2; margin-top: 0;">
                        <span id="btnText">자동 포스팅 시작</span>
                        <div class="loader" id="loader"></div>
                    </button>
                    <button type="button" id="pauseBtn" class="btn-secondary" style="flex: 1; display: none; background: #f59e0b; border: none; font-weight: bold;">일시중지</button>
                    <button type="button" id="stopBtn" class="btn-secondary" style="flex: 1; display: none; background: #ef4444; border: none; font-weight: bold;">정지</button>
                </div>
            </div>
        </form>

        <div id="resultCard" class="result-card">
            <h3 id="resultTitle" style="margin-bottom: 0.5rem;"></h3>
            <p id="resultDesc" style="color: var(--text-muted); line-height: 1.5;"></p>
        </div>
    </div>

    <script>
        // 페이지 로드 시 저장된 값 불러오기
        window.addEventListener('DOMContentLoaded', () => {
            const fields = ['partners_id', 'gemini_key', 'naver_id', 'naver_pw', 'cafe_id', 'menu_id', 'interval_minutes'];
            fields.forEach(field => {
                const saved = localStorage.getItem('coupang_poster_' + field);
                if (saved) {
                    document.getElementById(field).value = saved;
                }
            });
            updatePresetList();
        });

        // 프리셋 관리 로직
        const presetSelect = document.getElementById('cafe_preset_select');
        const saveBtn = document.getElementById('save_cafe_preset');
        const deleteBtn = document.getElementById('delete_cafe_preset');

        function updatePresetList() {
            const presets = JSON.parse(localStorage.getItem('coupang_cafe_presets') || '[]');
            presetSelect.innerHTML = '<option value="">저장된 프리셋 선택...</option>';
            presets.forEach((p, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `${p.cafe_id} / ${p.menu_id}`;
                presetSelect.appendChild(opt);
            });
        }

        saveBtn.addEventListener('click', () => {
            const cafe_id = document.getElementById('cafe_id').value;
            const menu_id = document.getElementById('menu_id').value;
            if (!cafe_id || !menu_id) return alert('카페 ID와 메뉴 ID를 입력해주세요.');
            
            const presets = JSON.parse(localStorage.getItem('coupang_cafe_presets') || '[]');
            presets.push({ cafe_id, menu_id });
            localStorage.setItem('coupang_cafe_presets', JSON.stringify(presets));
            updatePresetList();
            alert('현재 설정이 프리셋으로 저장되었습니다.');
        });

        deleteBtn.addEventListener('click', () => {
            const idx = presetSelect.value;
            if (idx === "") return alert('삭제할 프리셋을 선택해주세요.');
            
            let presets = JSON.parse(localStorage.getItem('coupang_cafe_presets') || '[]');
            presets.splice(idx, 1);
            localStorage.setItem('coupang_cafe_presets', JSON.stringify(presets));
            updatePresetList();
            alert('프리셋이 삭제되었습니다.');
        });

        presetSelect.addEventListener('change', (e) => {
            const idx = e.target.value;
            if (idx !== "") {
                const presets = JSON.parse(localStorage.getItem('coupang_cafe_presets') || '[]');
                const p = presets[idx];
                document.getElementById('cafe_id').value = p.cafe_id;
                document.getElementById('menu_id').value = p.menu_id;
            }
        });

        // 일시중지/정지 제어 로직
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');

        pauseBtn.addEventListener('click', async () => {
            const res = await fetch('/api/pause', { method: 'POST' });
            const data = await res.json();
            pauseBtn.textContent = data.is_paused ? '재개' : '일시중지';
            pauseBtn.style.background = data.is_paused ? '#10b981' : '#f59e0b';
        });

        stopBtn.addEventListener('click', async () => {
            if (confirm('모든 예약 포스팅 작업을 중단하시겠습니까?')) {
                await fetch('/api/stop', { method: 'POST' });
                alert('중단 요청을 보냈습니다. 현재 진행 중인 스텝이 끝나면 멈춥니다.');
                location.reload();
            }
        });

        document.getElementById('workflowForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            
            // UI 변경
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultCard.style.display = 'none';
            resultCard.className = 'result-card';

            // 제어 버튼 표시
            pauseBtn.style.display = 'block';
            stopBtn.style.display = 'block';

            const rawUrls = document.getElementById('coupang_urls').value;
            // 줄바꿈, 공백, 쉼표 등으로 구분된 URL들을 추출하여 배열로 만듦
            const coupang_urls = rawUrls.split(/[\n, ]+/).map(u => u.trim()).filter(u => u.startsWith('http'));

            const payload = {
                coupang_urls: coupang_urls,
                partners_id: document.getElementById('partners_id').value,
                gemini_key: document.getElementById('gemini_key').value,
                naver_id: document.getElementById('naver_id').value,
                naver_pw: document.getElementById('naver_pw').value,
                cafe_id: document.getElementById('cafe_id').value,
                menu_id: document.getElementById('menu_id').value,
                interval_minutes: parseInt(document.getElementById('interval_minutes').value) || 5
            };

            // 로컬 스토리지에 입력값 저장 (다음 실행 시 자동 로드)
            Object.keys(payload).forEach(key => {
                if (key !== 'coupang_urls') { // 매번 달라지는 URL은 제외
                    localStorage.setItem('coupang_poster_' + key, payload[key]);
                }
            });

            try {
                const response = await fetch('/api/run-bulk-workflow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                resultCard.style.display = 'block';
                if (data.success) {
                    document.getElementById('resultTitle').textContent = '🚀 자동 포스팅 시작됨!';
                    document.getElementById('resultTitle').style.color = 'var(--success)';
                    document.getElementById('resultDesc').innerHTML = `
                        총 <strong>${payload.coupang_urls.length}개</strong>의 상품을 ${payload.interval_minutes}분 간격으로 포스팅합니다.<br>
                        서버 로그에서 진행 상황을 확인하실 수 있습니다.
                    `;
                    // 성공 시 URL 입력 필드 자동 삭제
                    document.getElementById('coupang_urls').value = '';
                } else {
                    resultCard.classList.add('error');
                    document.getElementById('resultTitle').textContent = `❌ 실패 (Step: ${data.step})`;
                    document.getElementById('resultTitle').style.color = 'var(--error)';
                    document.getElementById('resultDesc').textContent = data.error;
                }
            } catch (err) {
                resultCard.style.display = 'block';
                resultCard.classList.add('error');
                document.getElementById('resultTitle').textContent = '❌ 네트워크 오류';
                document.getElementById('resultTitle').style.color = 'var(--error)';
                document.getElementById('resultDesc').textContent = err.message;
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
